<div class="navbar">
    <h2>🎥 Movie Explorer</h2>
    <ul>
      <li *ngFor="let cat of categories"
          (click)="selectCategory(cat)"
          [class.active]="category === cat">
        {{ cat }}
      </li>
    </ul>
  </div>
  
  <div class="container">
    <div class="search-bar">
      <input [(ngModel)]="query" placeholder="Search movie..." (input)="searchSubject.next(query)" />
      <button (click)="search()">Search</button>
    </div>
  
    <div class="filter-bar">
      <input #filterInput type="text" placeholder="Filter results..." (input)="filterClient(filterInput.value)" />
    </div>
  
    <div *ngIf="loading" class="loader">Loading...</div>
  
    <div class="top-movies">
      <h2>🔥 Top 5 Movies</h2>
      <div class="top-grid">
        <div class="top-card" *ngFor="let m of topMovies">
          <img [src]="m.Poster !== 'N/A' ? m.Poster : 'https://placehold.co/200x300?text=No+Image'" [alt]="m.Title" />
          <h4>{{ m.Title }}</h4>
          <p>{{ m.Year }}</p>
          <a [href]="'https://www.imdb.com/title/' + m.imdbID" target="_blank">View on IMDb</a>
        </div>
      </div>
    </div>
  
    <div class="pagination">
      <button (click)="prevPage()" [disabled]="page <= 1">⬅ Prev</button>
      <span>Page {{ page }}</span>
      <button (click)="nextPage()" [disabled]="!hasMore">Next ➡</button>
    </div>
  
    <div class="movies-grid">
      <div class="movie-card" *ngFor="let movie of filteredMovies">
        <img [src]="movie.Poster !== 'N/A' ? movie.Poster : 'https://placehold.co/200x300?text=No+Image'" alt="{{ movie.Title }}" />
        <h3>{{ movie.Title }}</h3>
        <p>{{ movie.Year }}</p>
        <a [href]="'https://www.imdb.com/title/' + movie.imdbID" target="_blank">View on IMDb</a>
      </div>
    </div>
  </div>
