<div class="search-bar">
  <input [(ngModel)]="query" placeholder="Search movies..." />
  <button (click)="onSearch()">Search</button>
</div>

<div *ngIf="loading">Loading...</div>
<div *ngIf="error">{{ error }}</div>

<div class="movie-grid">
  <div class="movie-card" *ngFor="let movie of movies" (click)="goToDetails(movie.imdbID)">
    <img [src]="movie.Poster !== 'N/A' ? movie.Poster : 'https://placehold.co/150x220'" alt="{{ movie.Title }}" />
    <h3>{{ movie.Title }}</h3>
    <p>{{ movie.Year }}</p>
  </div>
</div>
